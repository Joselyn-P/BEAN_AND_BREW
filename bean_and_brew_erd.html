
<style>
#erd svg { width: 100%; height: auto; }
#erd { padding: 1rem 0; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#B4B2A9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    edgeLabelBackground: dark ? '#2C2C2A' : '#F1EFE8',
  },
});

const diagram = `erDiagram
  USERS {
    uuid id PK
    string google_id
    string full_name
    string email
    string profile_photo_url
    string auth_provider
    timestamp created_at
    timestamp updated_at
  }

  ADDRESSES {
    uuid id PK
    uuid user_id FK
    string label
    string street
    string city
    string postal_code
    boolean is_default
  }

  PAYMENT_METHODS {
    uuid id PK
    uuid user_id FK
    string type
    string provider
    string last_four
    string expiry
    boolean is_default
  }

  CATEGORIES {
    uuid id PK
    string name
    string slug
    string icon_url
    int display_order
  }

  PRODUCTS {
    uuid id PK
    uuid category_id FK
    string name
    string description
    decimal base_price
    string image_url
    string temperature_type
    boolean is_available
    boolean is_featured
  }

  PRODUCT_OPTIONS {
    uuid id PK
    uuid product_id FK
    string option_type
    string label
    decimal price_modifier
  }

  FAVORITES {
    uuid id PK
    uuid user_id FK
    uuid product_id FK
    timestamp created_at
  }

  CARTS {
    uuid id PK
    uuid user_id FK
    timestamp updated_at
  }

  CART_ITEMS {
    uuid id PK
    uuid cart_id FK
    uuid product_id FK
    int quantity
    json selected_options
    decimal item_price
  }

  PROMO_CODES {
    uuid id PK
    string code
    string discount_type
    decimal discount_value
    int max_uses
    int used_count
    timestamp expires_at
  }

  ORDERS {
    uuid id PK
    uuid user_id FK
    uuid address_id FK
    uuid promo_code_id FK
    string fulfillment_type
    string status
    decimal subtotal
    decimal tax
    decimal delivery_fee
    decimal total
    string payment_method
    timestamp placed_at
    timestamp updated_at
  }

  ORDER_ITEMS {
    uuid id PK
    uuid order_id FK
    uuid product_id FK
    int quantity
    json selected_options
    decimal item_price
  }

  ORDER_TRACKING {
    uuid id PK
    uuid order_id FK
    string status
    string note
    timestamp timestamp
  }

  WEATHER_RECOMMENDATIONS {
    uuid id PK
    string weather_condition
    string temperature_range
    uuid product_id FK
    int priority
  }

  USERS ||--o{ ADDRESSES : "has"
  USERS ||--o{ PAYMENT_METHODS : "has"
  USERS ||--o{ FAVORITES : "saves"
  USERS ||--|| CARTS : "owns"
  USERS ||--o{ ORDERS : "places"
  CATEGORIES ||--o{ PRODUCTS : "contains"
  PRODUCTS ||--o{ PRODUCT_OPTIONS : "has"
  PRODUCTS ||--o{ FAVORITES : "saved in"
  PRODUCTS ||--o{ CART_ITEMS : "added to"
  PRODUCTS ||--o{ ORDER_ITEMS : "included in"
  PRODUCTS ||--o{ WEATHER_RECOMMENDATIONS : "recommended by"
  CARTS ||--o{ CART_ITEMS : "contains"
  ORDERS ||--o{ ORDER_ITEMS : "contains"
  ORDERS ||--o{ ORDER_TRACKING : "tracked by"
  ORDERS }o--|| ADDRESSES : "delivers to"
  ORDERS }o--o| PROMO_CODES : "applies"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
